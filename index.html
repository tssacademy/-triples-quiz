<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สไตล์การเทรดแบบไหนเหมาะกับนิสัยคุณ? | Triple S</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep:   #050a14;
    --navy-base:   #0a1122;
    --navy-card:   #101a30;
    --navy-border: #1b2a4a;
    --gold:        #c9a84c;
    --gold-light:  #f1df99;
    --gold-dim:    #967a33;
    --gold-glow:   rgba(201,168,76,0.08);
    --text:        #eef1f8;
    --text-muted:  #8294b5;
    --white:       #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--navy-deep);
    color: var(--text);
    font-family: 'Kanit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 15%, rgba(201,168,76,0.05) 0%, transparent 50%),
      radial-gradient(circle at 85% 85%, rgba(16,26,48,0.8) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper { width: 100%; max-width: 480px; padding: 30px 20px 60px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 30px; animation: fadeDown 0.6s ease both; }
  .header-badge { display: inline-block; border: 1px solid var(--gold-dim); padding: 4px 12px; margin-bottom: 16px; background: rgba(5,10,20,0.6); }
  .header-badge span { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
  .header h1 { font-size: 28px; font-weight: 700; line-height: 1.3; color: var(--white); margin-bottom: 8px; }
  .header h1 span { color: var(--gold-light); }
  .header p { font-size: 14px; color: var(--text-muted); font-weight: 300; line-height: 1.5; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 3px; background: var(--navy-border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold-light)); transition: width 0.4s ease; }
  .progress-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--gold); font-weight: 700; min-width: 35px; text-align: right; }
  .question-card { background: var(--navy-card); border: 1px solid var(--navy-border); border-top: 3px solid var(--gold); padding: 24px; margin-bottom: 16px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .q-number { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gold); letter-spacing: 1px; font-weight: 700; margin-bottom: 10px; }
  .q-text { font-size: 18px; font-weight: 500; line-height: 1.5; color: var(--white); }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--navy-card); border: 1px solid var(--navy-border); padding: 16px; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; border-radius: 4px; width: 100%; }
  .option-btn:hover { border-color: var(--gold-dim); background: var(--gold-glow); transform: translateX(4px); }
  .option-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.12); }
  .opt-key { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--gold); border: 1px solid var(--gold-dim); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .option-btn.selected .opt-key { background: var(--gold); color: var(--navy-deep); }
  .opt-text { font-size: 14px; font-weight: 300; line-height: 1.5; color: var(--text); }
  .next-btn { width: 100%; background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--navy-deep); border: none; padding: 16px; font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px; margin-top: 16px; display: none; border-radius: 4px; transition: all 0.2s; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,168,76,0.2); }
  .next-btn.visible { display: block; }
  .result-card { display: none; }
  .result-card.visible { display: block; animation: slideUp 0.5s ease both; }
  .result-crown { text-align: center; padding: 30px 20px; background: var(--navy-card); border: 1px solid var(--navy-border); border-top: 3px solid var(--gold); margin-bottom: 12px; border-radius: 4px; }
  .result-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
  .result-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .result-type-name { font-size: 28px; font-weight: 700; margin-bottom: 6px; color: var(--gold-light); }
  .result-tagline { font-size: 14px; color: var(--text); font-weight: 400; }

  /* SCORE BREAKDOWN — Fix #4 */
  .score-card { background: var(--navy-base); border: 1px solid var(--navy-border); padding: 18px 20px; margin-bottom: 12px; border-radius: 4px; }
  .score-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 14px; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .score-row:last-child { margin-bottom: 0; }
  .score-label { font-size: 12px; color: var(--text-muted); min-width: 110px; }
  .score-bar-wrap { flex: 1; height: 6px; background: var(--navy-border); border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 3px; transition: width 0.8s ease; }
  .score-bar-fill.winner { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
  .score-val { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gold); min-width: 24px; text-align: right; }

  .result-desc-card { background: var(--navy-card); border: 1px solid var(--navy-border); padding: 20px; margin-bottom: 12px; border-radius: 4px; }
  .result-desc-card p { font-size: 14px; line-height: 1.6; font-weight: 300; color: #cad5eb; }
  .traits-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .trait { font-size: 12px; padding: 4px 10px; background: rgba(27,42,74,0.4); border: 1px solid var(--navy-border); color: var(--gold-light); border-radius: 2px; }
  .weakness-card { background: var(--navy-base); border: 1px solid var(--navy-border); border-left: 3px solid var(--gold-dim); padding: 18px; margin-bottom: 12px; border-radius: 4px; }
  .weakness-label { font-size: 12px; font-weight: 600; color: var(--gold-light); margin-bottom: 6px; }
  .weakness-text { font-size: 14px; font-weight: 300; line-height: 1.6; color: var(--text); }
  .weakness-text strong { color: var(--gold-light); font-weight: 500; }
  .cta-card { background: var(--navy-card); border: 1px solid var(--gold-dim); padding: 24px 20px; margin-bottom: 16px; text-align: center; border-radius: 4px; }
  .cta-headline { font-size: 18px; font-weight: 600; color: var(--white); margin-bottom: 6px; line-height: 1.4; }
  .cta-sub { font-size: 13px; color: var(--text-muted); font-weight: 300; line-height: 1.5; margin-bottom: 18px; }
  .cta-buttons { display: flex; flex-direction: column; gap: 10px; }

  /* Button styles */
  .btn-gold, .btn-outline, .btn-line, .btn-discord {
    display: block; padding: 14px; font-family: 'Kanit', sans-serif; font-size: 15px;
    cursor: pointer; text-decoration: none; text-align: center; border-radius: 4px;
    transition: all 0.2s; font-weight: 600;
  }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--navy-deep); border: none; }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); transform: translateY(-1px); }

  /* Fix #2 — LINE เป็น CTA รอง ขนาดเล็กลง */
  .btn-line-secondary {
    display: block; padding: 11px 14px; font-family: 'Kanit', sans-serif; font-size: 13px;
    cursor: pointer; text-decoration: none; text-align: center; border-radius: 4px;
    transition: all 0.2s; font-weight: 400;
    background: transparent; color: #06C755; border: 1px solid rgba(6,199,85,0.35);
  }
  .btn-line-secondary:hover { background: rgba(6,199,85,0.08); border-color: #06C755; }

  .btn-outline { background: transparent; color: var(--gold-light); border: 1px solid var(--gold-dim); font-weight: 400; }
  .btn-outline:hover { background: var(--gold-glow); border-color: var(--gold-light); }
  .btn-discord { background: #5865F2; color: var(--white); border: none; }
  .btn-discord:hover { background: #4752d9; transform: translateY(-1px); }

  .bottom-row { display: flex; gap: 10px; }
  .btn-share, .btn-retry { flex: 1; background: transparent; border: 1px solid var(--navy-border); color: var(--text-muted); padding: 12px; font-family: 'Kanit', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; border-radius: 4px; }
  .btn-share:hover { border-color: var(--gold-dim); color: var(--gold); }
  .btn-retry:hover { border-color: var(--text-muted); color: var(--text); }


  /* SOCIAL FOLLOW */
  .social-follow { margin-top: 20px; background: var(--navy-card); border: 1px solid var(--navy-border); border-radius: 4px; padding: 18px 16px; text-align: center; }
  .social-follow-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; }
  .social-links { display: flex; flex-direction: column; gap: 8px; }
  .social-link { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--navy-border); border-radius: 4px; text-decoration: none; transition: all 0.2s ease; background: var(--navy-base); }
  .social-link:hover { border-color: var(--gold-dim); background: var(--gold-glow); transform: translateX(3px); }
  .social-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .social-icon.fb { background: #1877F2; }
  .social-icon.yt { background: #FF0000; }
  .social-icon.tt { background: #000; border: 1px solid #444; }
  .social-info { text-align: left; }
  .social-platform { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .social-name { font-size: 13px; font-weight: 500; color: var(--text); }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-badge"><span>Triple S Discovery</span></div>
    <h1>สไตล์การเทรดแบบไหน<br><span>เหมาะกับนิสัยของคุณ?</span></h1>
    <p>5 คำถามค้นหาตัวตน เพื่อเส้นทางการเทรดที่ใช่สำหรับคุณโดยเฉพาะ</p>
  </div>
  <div id="quiz-section">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-num" id="progress-num">0 / 5</span>
    </div>
    <div id="question-area"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">ถัดไป &nbsp;→</button>
  </div>
  <div id="result-section" class="result-card"></div>
</div>

<script>
const LINKS = {

  excel:     'https://drive.google.com/drive/folders/1LwDpfaLAVM0yhRmvQqmwpmRw-qg7ecPj?hl=th',
  salepage:  'https://tssacademy.github.io/triples-foundation/',
  discord:   'https://discord.com/invite/w9ATcva8mm',
  line:      'https://line.me/R/ti/p/@864chlqd',
};

const TYPE_LABELS = {
  scalper:  '⚡ Scalper',
  swing:    '🌊 Swing',
  position: '🏔️ Position',
  ea:       '🤖 EA Farmer',
  guided:   '🐻 Guided',
};

// Fix #1 — เปลี่ยน -2% เป็นภาษาที่มือใหม่เข้าถึงได้
const questions = [

    options: [
      { key:'A', text:'คัดทิ้งทันที เจ็บสั้นดีกว่าปวดนาน ไม่ชอบถือลากข้ามวัน',                           type:'scalper'  },
      { key:'B', text:'ปล่อยไหลตามแผน ถือต่อยาวๆ ไม่หวั่นไหวกับความผันผวนระยะสั้น',                   type:'position' },
      { key:'C', text:'ไม่คิดอะไรเลย ยังทำตามแผนเดิม แล้วค่อยเช็กผลตอนเช้า',                          type:'ea'       },
      { key:'D', text:'ไม่ตกใจ แต่ขอตั้งหลักก่อน ค่อยเช็กแนวรับสำคัญอีก 1-2 วัน',                    type:'swing'    },
      { key:'E', text:'ยังไม่แน่ใจว่าควรทำอะไร อยากมีคนช่วยดูและวิเคราะห์ด้วยกัน',                     type:'guided'   },
    ]
  },
  {
    id: 2,
    text: 'วันที่ตลาดนิ่งสนิท ไม่มีสัญญาณให้เข้าเทรด คุณจัดการตัวเองอย่างไร?',
    options: [
      { key:'A', text:'ปิดจอ ไปพักผ่อน ตลาดไม่วิ่งก็แค่แยกย้าย ไม่ใช่ปัญหา',                         type:'position' },
      { key:'B', text:'อึดอัดมาก นั่งไม่ติด คันมือ อยากกดออเดอร์สักหน่อย',                              type:'scalper'  },
      { key:'C', text:'ชิลมาก ปล่อยบอทรันไป เอาเวลาไปใช้ชีวิตเต็มที่',                                type:'ea'       },
      { key:'D', text:'เฝ้าหน้าจอต่อ เปิดดูบ่อยๆ เผื่อมีโอกาสสักจังหวะ',                              type:'swing'    },
      { key:'E', text:'เข้าไปถามในกลุ่มหรือหาคนที่รู้มากกว่า ให้ช่วยดูว่าตลาดเป็นยังไง',               type:'guided'   },
    ]
  },
  {
    id: 3,
    text: 'เป้าหมายสูงสุดในการเข้ามาลุยตลาดการเงิน ข้อไหนตรงใจคุณที่สุด?',
    options: [
      { key:'A', text:'สร้างฟาร์มระบบอัตโนมัติ ให้เครื่องจักรปั๊มเงินแทน 24 ชม. โดยไม่ต้องนั่งวิเคราะห์เอง', type:'ea' },
      { key:'B', text:'เลือกจุดเข้าที่ได้เปรียบจาก TF ใหญ่ แล้วถือยาวรันเทรนด์ระดับสัปดาห์หรือเดือน', type:'position' },
      { key:'C', text:'ดักกินคำโตเป็นรอบสัปดาห์ เล่นตามรอบสวิง ไม่ต้องเหนื่อยขยับทุกวัน',             type:'swing'    },

  {
    id: 5,
    text: 'ถ้าพอร์ตยังไม่โตตามเป้า คิดว่าสาเหตุหลักมาจากไหน?',

      { key:'C', text:'พื้นฐานเทคนิคอลและโครงสร้างเทรนด์ภาพใหญ่ยังไม่แน่น ทำให้ไม่มั่นใจในแผน',      type:'position' },

    ]

const results = {
  scalper: {
    emoji: '⚡', name: 'Scalper', tagline: 'ไว · เฉียบขาด · อยู่กับปัจจุบัน',
    desc: 'คุณคือนักล่าที่มีความตื่นตัวสูงมาก ชอบความชัดเจนและเห็นผลลัพธ์ที่รวดเร็ว ตัดสินใจได้ในเสี้ยววินาที จุดเด่นของคุณคือความเด็ดขาดในการคุมความเสี่ยงระยะสั้น',
    traits: ['#Real-time','#ตัดสินใจไว','#ไม่ถือข้ามวัน','#คุมความเสี่ยงไว'],
    weakness: 'สายนี้มักตกม้าตายตรง <strong>จังหวะเข้าที่เร่งรีบเกินไป</strong> และเสี่ยงเสพติดการลุยจนเกินพอดี การมี Framework ที่ชัดเจนอย่าง Triple S จะช่วยกรองสิ่งรบกวนและทำให้อยู่รอดได้ยาวๆ ครับ',
    cta_headline: 'อยากจับจังหวะได้คมและปลอดภัยขึ้นไหม?',
    cta_sub: 'พี่สรุป Checklist 7 ด่านที่ Scalper ต้องผ่านก่อนกดออเดอร์ทุกครั้ง ไว้ให้ฟรีแล้วครับ',

let current = 0, answers = [];

function renderQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-num').textContent = `${current} / ${questions.length}`;
  document.getElementById('question-area').innerHTML = `
    <div class="question-card">
      <div class="q-number">STAGE ${String(q.id).padStart(2,'0')}</div>
      <div class="q-text">${q.text}</div>
    </div>
    <div class="options">
      ${q.options.map((o,i) => `
        <button class="option-btn" onclick="selectOption(this,'${o.type}')"
          style="animation: slideUp 0.3s ${i*0.06}s ease both; opacity:0;">
          <span class="opt-key">${o.key}</span>
          <span class="opt-text">${o.text}</span>
        </button>
      `).join('')}
    </div>
  `;
  document.getElementById('next-btn').classList.remove('visible');
}

function selectOption(el, type) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  answers[current] = type;
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion() {
  if (!answers[current]) return;
  current++;
  if (current < questions.length) renderQuestion();
  else showResult();
}

function showResult() {
  const count = { scalper:0, swing:0, position:0, ea:0, guided:0 };
  answers.forEach(a => count[a]++);
  const sorted = Object.entries(count).sort((a,b) => b[1]-a[1]);
  const winner = sorted[0][0];
  const r = results[winner];
  const total = questions.length;

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-num').textContent = '5 / 5';
  document.getElementById('quiz-section').classList.add('hidden');

  // Fix #4 — Score breakdown
  const scoreRows = sorted.map(([type, val]) => {
    const pct = Math.round((val / total) * 100);
    const isWinner = type === winner;
    return `
      <div class="score-row">
        <span class="score-label">${TYPE_LABELS[type]}</span>
        <div class="score-bar-wrap">
          <div class="score-bar-fill ${isWinner ? 'winner' : ''}" style="width:${pct}%"></div>
        </div>
        <span class="score-val">${val}/${total}</span>
      </div>
    `;
  }).join('');

  const btns = r.buttons.map(b =>
    `<a class="${b.cls}" href="${b.href}" target="_blank">${b.label}</a>`

          </div>
          <div class="social-info">
            <div class="social-platform">TikTok</div>
            <div class="social-name">บีแบร์ สอนเทรด</div>
          </div>
        </a>
      </div>
    </div>
    <div class="bottom-row">
      <button class="btn-share" onclick="copyResult('${winner}')">📋 คัดลอกผลลัพธ์</button>
      <button class="btn-retry" onclick="resetQuiz()">↩ ทำใหม่อีกครั้ง</button>
    </div>
  `;

  // Animate score bars after render
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0%';
      setTimeout(() => el.style.width = w, 50);
    });
  }, 100);
}

function copyResult(type) {
  const r = results[type];
  const text = `🎯 สไตล์การเทรดของฉันคือ: ${r.emoji} ${r.name}\n"${r.tagline}"\n\nค้นหาสไตล์ของคุณได้ที่ Triple S Community ครับ!`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-share');
    btn.textContent = '✦ คัดลอกเรียบร้อย!';
    setTimeout(() => btn.textContent = '📋 คัดลอกผลลัพธ์', 2000);
  });
}

function resetQuiz() {
  current = 0; answers = [];
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('result-section').innerHTML = '';
  document.getElementById('quiz-section').classList.remove('hidden');
  renderQuestion();
}

renderQuestion();
</script>
